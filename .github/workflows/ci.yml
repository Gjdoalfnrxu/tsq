name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22.x", "1.23.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install tsgo
        run: |
          npm install -g @typescript/native-preview
          # @typescript/native-preview ships a `tsgo` binary; export TSGO_PATH
          # so the integration test's strict CI gate can find it.
          TSGO_BIN=$(command -v tsgo || true)
          if [ -z "$TSGO_BIN" ]; then
            # Fall back to resolving via npm prefix.
            TSGO_BIN="$(npm prefix -g)/bin/tsgo"
          fi
          echo "Using tsgo at: $TSGO_BIN"
          "$TSGO_BIN" --version
          echo "TSGO_PATH=$TSGO_BIN" >> "$GITHUB_ENV"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
